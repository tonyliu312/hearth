name: ✨ Feature request
description: Propose an improvement or new capability
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem are you trying to solve? Who benefits?
      placeholder: |
        As someone running Ollama on a single 4090 box, I want Hearth to
        auto-detect Ollama's metrics on :11434 without me adding YAML config.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Sketch the UX or API if it helps.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways you've thought about solving this
    validations:
      required: false
