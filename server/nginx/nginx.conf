# AI-MONITOR · nginx site
# Serves the frontend on :80, reverse-proxies /api/* to the FastAPI backend,
# and keeps SSE alive by disabling buffering on /api/stream.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Static frontend assets — bind-mounted from ../../ in docker-compose.
    root /usr/share/nginx/html;
    index index.html;

    # 无构建/无文件哈希 + 浏览器内 Babel + bind-mount 源码：源文件不可长缓存，
    # 否则前端改动用户刷新也看不到（曾踩坑）。源码 no-cache 必重验证；
    # 仅真正静态的字体/图片长缓存。
    location = /index.html { add_header Cache-Control "no-cache"; }
    location ~* \.(js|jsx|css)$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location ~* \.(svg|png|woff2|jpg|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # API — generic（宿主 venv 进程，nginx 走 host 网络可直连 127.0.0.1）
    location /api/ {
        proxy_pass         http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 75s;
    }

    # SSE — disable buffering, allow infinite read
    location = /api/stream {
        proxy_pass             http://127.0.0.1:8088/api/stream;
        proxy_http_version     1.1;
        proxy_set_header       Connection        "";
        proxy_buffering        off;
        proxy_cache            off;
        chunked_transfer_encoding on;
        proxy_read_timeout     24h;
        add_header             X-Accel-Buffering no;
    }

    # SPA fallback for hash-routed sections (we use anchor links, this is just defensive)
    location / { try_files $uri $uri/ /index.html; }
}
