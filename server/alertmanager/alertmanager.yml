# AI-MONITOR · Alertmanager
# Routes critical alerts to whatever channels you wire in (webhook, email,
# Pushover, Bark, ntfy.sh, etc.). Defaults to no-op so an unconfigured
# install doesn't spam you — replace the receivers below.

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'node']
  group_wait: 30s
  group_interval: 2m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match: { severity: critical }
      receiver: 'critical'
      group_wait: 10s
    - match: { severity: warning }
      receiver: 'default'
    - match: { severity: info }
      receiver: 'log-only'

receivers:
  - name: 'default'
    # Replace with your real channel. Example webhook below.
    webhook_configs: []
    # webhook_configs:
    #   - url: 'http://api:8080/internal/alert-webhook'
    #     send_resolved: true

  - name: 'critical'
    webhook_configs: []
    # Hook this up to ntfy.sh, Bark, Pushover, or your phone of choice.
    # webhook_configs:
    #   - url: 'https://ntfy.sh/your-private-topic'
    #     send_resolved: true

  - name: 'log-only'
    webhook_configs: []

inhibit_rules:
  # If a node is down, suppress per-GPU alerts on that node.
  - source_matchers: [severity="critical", alertname="NodeDown"]
    target_matchers: [severity=~"warning|info"]
    equal: [node]
