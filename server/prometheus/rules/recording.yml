# AI-MONITOR · recording rules
# Pre-computed aggregates for cheap frontend queries.

groups:
- name: cluster
  interval: 15s
  rules:
    # ── GPU pool ──────────────────────────────────────────────────
    - record: cluster:gpu_util:avg
      expr: avg(DCGM_FI_DEV_GPU_UTIL)
    - record: cluster:gpu_util:max
      expr: max(DCGM_FI_DEV_GPU_UTIL)
    - record: cluster:sm_activity:avg
      expr: avg(DCGM_FI_PROF_SM_ACTIVE)
    - record: cluster:vram_used_gb:sum
      expr: sum(DCGM_FI_DEV_FB_USED) / 1024
    - record: cluster:vram_total_gb:sum
      expr: sum(DCGM_FI_DEV_FB_USED + DCGM_FI_DEV_FB_FREE) / 1024
    - record: cluster:gpu_temp:max
      expr: max(DCGM_FI_DEV_GPU_TEMP)
    - record: cluster:power_w:sum
      expr: sum(DCGM_FI_DEV_POWER_USAGE)

    # ── CPU / RAM / Disk pool ─────────────────────────────────────
    - record: cluster:cpu_util:avg
      expr: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[1m])) * 100)
    - record: cluster:mem_used_gb:sum
      expr: sum(node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / 1024 / 1024 / 1024
    - record: cluster:mem_total_gb:sum
      expr: sum(node_memory_MemTotal_bytes) / 1024 / 1024 / 1024
    - record: cluster:disk_used_gb:sum
      expr: sum(node_filesystem_size_bytes{mountpoint="/"} - node_filesystem_avail_bytes{mountpoint="/"}) / 1024 / 1024 / 1024
    - record: cluster:disk_total_gb:sum
      expr: sum(node_filesystem_size_bytes{mountpoint="/"}) / 1024 / 1024 / 1024

    # ── LiteLLM throughput ────────────────────────────────────────
    - record: cluster:tokens_per_sec
      expr: sum(rate(litellm_total_tokens_metric[1m]))
    - record: cluster:requests_per_sec
      expr: sum(rate(litellm_total_requests_metric[1m]))

- name: per_model
  interval: 15s
  rules:
    - record: model:tps
      expr: sum by (model) (rate(litellm_total_tokens_metric[1m]))
    - record: model:rps
      expr: sum by (model) (rate(litellm_total_requests_metric[1m]))
    - record: model:ttft_p50
      expr: histogram_quantile(0.50, sum by (le, model) (rate(litellm_ttft_bucket[5m])))
    - record: model:ttft_p95
      expr: histogram_quantile(0.95, sum by (le, model) (rate(litellm_ttft_bucket[5m])))
    - record: model:e2e_p50
      expr: histogram_quantile(0.50, sum by (le, model) (rate(litellm_request_latency_bucket[5m])))
    - record: model:e2e_p95
      expr: histogram_quantile(0.95, sum by (le, model) (rate(litellm_request_latency_bucket[5m])))
    - record: model:e2e_p99
      expr: histogram_quantile(0.99, sum by (le, model) (rate(litellm_request_latency_bucket[5m])))
    - record: model:err_rate
      expr: |
        sum by (model) (rate(litellm_total_requests_metric{status=~"[45].."}[5m]))
          /
        sum by (model) (rate(litellm_total_requests_metric[5m]))
    - record: model:kv_cache
      expr: avg by (model) (vllm:gpu_cache_usage_perc)

# ── Home Assistant integration (OPTIONAL) ─────────────────────────────
# Aggregates and derived efficiency metrics from the ha-exporter feed.
# These rules return empty if no ha_* series exist (exporter not deployed) —
# Hearth's _ha_power/_ha_env helpers then emit null fields and the UI
# hides the energy cards entirely.
- name: home_assistant
  interval: 15s
  rules:
    - record: cluster:wall_power_w:sum
      expr: sum(ha_node_wall_power_watts)
    - record: cluster:gpu_power_w:sum
      expr: sum(DCGM_FI_DEV_POWER_USAGE)
    # Real efficiency: LiteLLM throughput per watt of REAL (socket-side) power.
    # clamp_min(1) prevents div-by-zero when wall power is absent.
    - record: cluster:tokens_per_watt
      expr: |
        sum(rate(litellm_total_tokens_metric[1m]))
          /
        clamp_min(sum(ha_node_wall_power_watts), 1)
    # Per-node "overhead" ratio = wall / GPU. > 1 means CPU/PSU/fan/AC
    # overhead; closer to 1 means GPU dominates the draw.
    - record: node:power_overhead_ratio
      expr: ha_node_wall_power_watts / clamp_min(on(node) DCGM_FI_DEV_POWER_USAGE, 1)
